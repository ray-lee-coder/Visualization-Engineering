<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f857a6"/>
      <stop offset="100%" style="stop-color:#ff5858"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="12"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="#00d2ff" opacity="0.05"/>
  <circle cx="1100" cy="320" r="80" fill="#3a7bd5" opacity="0.05"/>
  <circle cx="600" cy="350" r="100" fill="#f857a6" opacity="0.03"/>

  <!-- Connection lines (abstract) -->
  <path d="M150 280 Q300 320 450 280 Q600 240 750 280 Q900 320 1050 280" stroke="#00d2ff" stroke-width="1" fill="none" opacity="0.15"/>
  <path d="M150 300 Q300 340 450 300 Q600 260 750 300 Q900 340 1050 300" stroke="#3a7bd5" stroke-width="1" fill="none" opacity="0.1"/>

  <!-- Title -->
  <text x="600" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white" filter="url(#glow)">
    Visualization Engineering
  </text>

  <!-- Subtitle -->
  <text x="600" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#a0a0c0">
    Agent-native Visualization Stack · 赛道全景图 · 选型手册
  </text>

  <!-- Tagline -->
  <rect x="250" y="205" width="700" height="50" rx="25" fill="#00d2ff" opacity="0.08" stroke="#00d2ff" stroke-width="1" stroke-opacity="0.3"/>
  <text x="600" y="236" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#c0c0e0">
    你不是在找"画图软件"——你是在找 Agent 能直接产出可视化交付物的工具链
  </text>

  <!-- Layer badges -->
  <g transform="translate(180, 285)">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="#00d2ff" opacity="0.15" stroke="#00d2ff" stroke-width="0.5"/>
    <text x="60" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#00d2ff">📐 DSL</text>
  </g>
  <g transform="translate(320, 285)">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="#3a7bd5" opacity="0.15" stroke="#3a7bd5" stroke-width="0.5"/>
    <text x="60" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3a7bd5">🤖 Skills</text>
  </g>
  <g transform="translate(460, 285)">
    <rect x="0" y="0" width="130" height="30" rx="15" fill="#f857a6" opacity="0.15" stroke="#f857a6" stroke-width="0.5"/>
    <text x="65" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#f857a6">🔌 MCP Servers</text>
  </g>
  <g transform="translate(610, 285)">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="#ff9a56" opacity="0.15" stroke="#ff9a56" stroke-width="0.5"/>
    <text x="60" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ff9a56">🖼 Rendering</text>
  </g>
  <g transform="translate(750, 285)">
    <rect x="0" y="0" width="130" height="30" rx="15" fill="#56d9a9" opacity="0.15" stroke="#56d9a9" stroke-width="0.5"/>
    <text x="65" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#56d9a9">🔍 Code VIZ</text>
  </g>
  <g transform="translate(900, 285)">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="#c084fc" opacity="0.15" stroke="#c084fc" stroke-width="0.5"/>
    <text x="60" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c084fc">🏗 E2E</text>
  </g>

  <!-- Footer text -->
  <text x="600" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#606080">
    收录标准：开源 · Agent 可直出 · 结构化视觉产物 · 有维护活性
  </text>
</svg>
